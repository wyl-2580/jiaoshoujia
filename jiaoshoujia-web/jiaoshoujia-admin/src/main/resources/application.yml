server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev,mysql
  messages:
    basename: i18n/messages
    encoding: UTF-8
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  type-aliases-package: com.jiaoshoujia.**.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  rsa:
    private-key-location: classpath:keys/private.pem
    public-key-location: classpath:keys/public.pem

app:
  cache:
    type: caffeine
  file:
    upload-path: ./uploads
    allowed-extensions: jpg,png,gif,bmp,doc,docx,xls,xlsx,pdf,txt,zip
    max-size: 10485760

knife4j:
  enable: true
  setting:
    language: zh_cn
